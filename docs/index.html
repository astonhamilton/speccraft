<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpecCraft — Coming Soon</title>
  <style>
    :root {
      --bg1: #2c3e50;
      --bg2: #4ca1af;
      --accent: #ffffff;
      --ink: #0f172a;
    }

    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      background-size: 200% 200%;
      animation: gradientShift 14s ease-in-out infinite;
      overflow: hidden;
    }

    .card {
      position: relative;
      width: min(760px, 92vw);
      padding: 48px 28px 40px;
      text-align: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      transform: translateY(8px);
      opacity: 0;
      animation: fadeUp 900ms ease-out 250ms forwards;
    }

    .logo {
      font-size: clamp(42px, 6vw, 64px);
      line-height: 1;
      display: inline-block;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.35));
      animation: float 6s ease-in-out infinite;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(36px, 6.2vw, 56px);
      letter-spacing: 0.4px;
    }

    .tagline {
      margin: 0 auto 22px;
      font-size: clamp(16px, 2.8vw, 20px);
      line-height: 1.6;
      max-width: 680px;
      opacity: 0.95;
    }

    .coming {
      margin: 10px auto 28px;
      font-weight: 700;
      font-size: clamp(16px, 2.8vw, 18px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e6f2f7;
    }

    .typewrap {
      display: inline-block;
      white-space: nowrap;
      border-right: 2px solid rgba(255,255,255,0.85);
      box-sizing: content-box;
      overflow: hidden;
      width: 0;
      animation: typing 2.8s steps(24, end) 550ms forwards,
                 caret 750ms steps(1) infinite;
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .button {
      background: var(--accent);
      color: var(--ink);
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.28);
      background: #f5f5f5;
    }

    .footer {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 0.02em;
      opacity: 0.8;
    }

    .orb, .orb2 {
      position: fixed;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.18;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    .orb {
      width: 420px; height: 420px;
      background: radial-gradient(circle at 30% 30%, #9be7ff, #4ca1af);
      top: -80px; right: -60px;
      animation: drift1 20s ease-in-out infinite;
    }
    .orb2 {
      width: 360px; height: 360px;
      background: radial-gradient(circle at 70% 70%, #ffd6a5, #ef709b);
      bottom: -80px; left: -60px;
      animation: drift2 24s ease-in-out infinite;
    }

    @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes typing { from { width: 0; } to { width: 16.6ch; } }
    @keyframes caret { 0%, 100% { border-color: rgba(255,255,255,0); } 50% { border-color: rgba(255,255,255,0.85); } }
    @keyframes drift1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-14px, 8px) scale(1.05); } }
    @keyframes drift2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(12px, -10px) scale(1.04); } }

    @media (prefers-reduced-motion: reduce) {
      body { animation: none; }
      .card { animation: none; opacity: 1; transform: none; }
      .logo { animation: none; }
      .typewrap { animation: none; border-right: none; width: auto; }
      .orb, .orb2 { display: none; }
    }
  </style>
</head>
<body>
  <div class="orb" aria-hidden="true"></div>
  <div class="orb2" aria-hidden="true"></div>

  <main class="card" role="main" aria-label="SpecCraft Coming Soon">
    <div class="logo" aria-hidden="true">🏗️</div>
    <h1>SpecCraft</h1>
    <p class="tagline">Your AI-powered architecture design companion — helping you move from conversation to structured, compliant specs</p>

    <div class="coming" aria-live="polite">
      <span class="typewrap">Launching soon…</span>
    </div>

    <div class="actions">
      <a class="button" href="https://github.com/astonhamilton/spacecraft" aria-label="View SpecCraft on GitHub">View on GitHub</a>
    </div>
  </main>

  <div class="footer">© 2025 SpecCraft Project — Coming Soon</div>
</body>
</html>
